<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
    integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
  <title>MY TO-DO-LIST</title>
  <style>
    body {
      background-color:skyblue;
    }
   #add{
     background-color:blue;
   }
  </style>
</head>
<div class="container my-4">
  <h2 class="text-center">MY TO-DO-LIST</h2>
  <div class="form-group">
    <label for="title"><b>Title</b></label>
    <input type="text" class="form-control" id="title" aria-describedby="emailHelp">
    <small id="emailHelp" class="form-text text-muted">Add an item to the list</small>
  </div>
  <div class="form-group">
    <label for="description"><b>Description</b></label>
    <textarea class="form-control" id="description" rows="3"></textarea>
  </div>
  <button id="add" class="btn btn-primary">Add to list</button>
  <input  id="add" type="button" value="Clear Title" class="btn btn-primary" onclick="clearInput1()">
  <input  id="add" type="button" value="Clear Description" class="btn btn-primary" onclick="clearInput2()">
  <div id="items" class="my-4">
    <h2>Your Items</h2>
    <table class="table">
      <thead>
        <tr>
          <th scope="col">S.No</th>
          <th scope="col">Item Title</th>
          <th scope="col">Item Description</th>
          <th scope="col">Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td><button class="btn btn-sm btn-primary">Delete</button></td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
<script src="to-do-list.js"></script>
</body>
</html>
